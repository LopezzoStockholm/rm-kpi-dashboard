server {
    listen 80;
    server_name _;

    # Dashboard — root
    # OAuth callback page
    location /oauth/callback {
        root /usr/share/nginx/html;
        try_files /oauth-callback.html =404;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Custom CSS for Twenty
    location /rm-custom.css {
        root /usr/share/nginx/html;
        add_header Content-Type text/css;
    }

    # Twenty CRM — reverse proxy with CSS injection
    location /crm/ {
        rewrite ^/crm/?(.*) /$1 break;
        proxy_pass http://rm-twenty:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Inject custom CSS into HTML responses
        sub_filter '</head>' '<link rel="stylesheet" href="/rm-custom.css"></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # Twenty API — no CSS injection needed
    location /api/ {
        proxy_pass http://rm-twenty:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metadata/ {
        proxy_pass http://rm-twenty:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /files/ {
        proxy_pass http://rm-twenty:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
