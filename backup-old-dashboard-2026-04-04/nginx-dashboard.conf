server {
    listen 80;
    server_name _;

    # === DASHBOARD (exact routes only) ===

    # Dashboard — exact root only
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # Service worker (kill old PWA cache)
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # OAuth callback page (dashboard)
    location = /oauth/callback {
        root /usr/share/nginx/html;
        try_files /oauth-callback.html =404;
    }

    # Custom CSS (shared — injected into Twenty via sub_filter)
    location = /rm-custom.css {
        root /usr/share/nginx/html;
        add_header Content-Type text/css;
    }

    # === LABEL API (dashboard → label backend) ===
    location /api/ {
        proxy_pass http://172.17.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    # === TWENTY CRM (everything else) ===

    location / {
        proxy_pass http://rm-twenty:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Inject custom CSS into HTML responses from Twenty
        sub_filter '</head>' '<link rel="stylesheet" href="/rm-custom.css"></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
